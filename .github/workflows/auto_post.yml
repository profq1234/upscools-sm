name: Generate and Post Insta Carousel to Telegram

on:
  schedule:
    # Runs automatically every day at 4:00 AM UTC (9:30 AM IST)
    - cron: '0 4 * * *' 
  workflow_dispatch: # Gives you a "Run workflow" button in the GitHub UI for manual tests

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to commit the updated history file

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright & Linux System Dependencies
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run Script (Generate Images & Send to Telegram)
        env:
          # Pulls securely from GitHub Secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/main.py

      - name: Commit and Push Updated History State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/processed_history.json
          
          # This command checks if the file changed. If yes, it commits and pushes.
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update processed history state" && git push)
