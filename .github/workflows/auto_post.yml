name: Generate and Post Insta Carousel to Telegram

on:
  schedule:
    # MONDAY: 11:40 AM, 3:40 PM, 7:10 PM (IST)
    - cron: '10 6 * * 1'
    - cron: '10 10 * * 1'
    - cron: '40 13 * * 1'
    
    # TUESDAY: 6:40 AM, 11:40 AM, 4:40 PM (IST)
    - cron: '10 1 * * 2'
    - cron: '10 6 * * 2'
    - cron: '10 11 * * 2'
    
    # WEDNESDAY: 7:40 AM, 1:40 PM, 6:40 PM (IST)
    - cron: '10 2 * * 3'
    - cron: '10 8 * * 3'
    - cron: '10 13 * * 3'
    
    # THURSDAY: 6:40 AM, 12:40 PM, 4:40 PM (IST)
    - cron: '10 1 * * 4'
    - cron: '10 7 * * 4'
    - cron: '10 11 * * 4'
    
    # FRIDAY: 5:40 AM, 11:40 AM, 3:40 PM (IST)
    - cron: '10 0 * * 5'
    - cron: '10 6 * * 5'
    - cron: '10 10 * * 5'
    
    # SATURDAY: 9:40 AM, 1:40 PM, 7:40 PM (IST)
    - cron: '10 4 * * 6'
    - cron: '10 8 * * 6'
    - cron: '10 14 * * 6'
    
    # SUNDAY: 9:40 AM, 1:40 PM, 7:40 PM (IST)
    - cron: '10 4 * * 0'
    - cron: '10 8 * * 0'
    - cron: '10 14 * * 0'
    
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright & Linux System Dependencies
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run Script (Generate Images & Send to Telegram)
        env:
          TELEGRAM_BOT_TOKEN_SOCIAL_MEDIA: ${{ secrets.TELEGRAM_BOT_TOKEN_SOCIAL_MEDIA }}
          TELEGRAM_CHAT_ID_SOCIAL_MEDIA: ${{ secrets.TELEGRAM_CHAT_ID_SOCIAL_MEDIA }}
        run: |
          python src/main.py

      - name: Commit and Push Updated History State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/processed_history.json
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update processed history state" && git push)
