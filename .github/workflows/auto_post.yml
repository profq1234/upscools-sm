name: Generate and Post Insta Carousel to Telegram

on:
  schedule:
    - cron: '0 4 * * *' 
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright & Linux System Dependencies
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run Script (Generate Images & Send to Telegram)
        env:
          # THE FIX: Left side stays the same, right side pulls the new Secrets!
          TELEGRAM_BOT_TOKEN_SOCIAL_MEDIA: ${{ secrets.TELEGRAM_BOT_TOKEN_SOCIAL_MEDIA }}
          TELEGRAM_CHAT_ID_SOCIAL_MEDIA: ${{ secrets.TELEGRAM_CHAT_ID_SOCIAL_MEDIA }}
        run: |
          python src/main.py

      - name: Commit and Push Updated History State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/processed_history.json
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update processed history state" && git push)
